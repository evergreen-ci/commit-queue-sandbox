# This doesn't use pine, but is similar to the setup.
tasks:
  - name: clone
    commands:
      - command: git.get_project
        params:
          directory: src
          revisions:
            module1: ${module1_rev}

buildvariants:
  - name: variant1
    modules:
      - module1
    display_name: "Variant 1"
    tasks:
      - name: clone
    run_on:
      - ubuntu2204-small

modules:
  - name: module1
    owner: evergreen-ci
    repo: commit-queue-sandbox
    branch: zackary_module
